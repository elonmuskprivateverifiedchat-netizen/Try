services:
  - type: web
    name: nextrade-api
    env: node
    buildCommand: |
      npm install -g pnpm@9 &&
      pnpm install &&
      pnpm --filter @workspace/api-server build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENABLE_DEMO_AUTH
        value: "false"
      - key: LOG_LEVEL
        value: info
